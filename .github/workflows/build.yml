name: "Main / Pull requests build"
on:
    pull_request:
        paths-ignore:
            - '.txt'
            - 'LICENSE'
            - 'docs/**'
        branches: [ main ]
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            upload_build_output:
                description: "Include JARs and class files in S3 upload"
                type: boolean
                default: false

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write   # OIDC token for operator presigned URL broker
    contents: read
    packages: read

env:
    SIDECAR_IMAGE: ghcr.io/kkaple/omnibor-sidecar:dev
    MVN_VER: "3.9.8"
    OPERATOR_URL: https://d1nzmqdbw8u7lo.cloudfront.net
    OIDC_AUDIENCE: on-prem
    TENANT_ID: '["cd71c989-264a-4f1c-9aae-64bf036fccfc","75fc2214-adb9-4bfc-b7f6-b771b4f2bb8b"]'

jobs:
    pre-commit:
        name: Pre-commit check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout git repository
                uses: actions/checkout@v4.1.6
            -   name: Setup python
                uses: actions/setup-python@v6
                with:
                    python-version: "3.9"
            -   name: Setup Java
                uses: ./.github/actions/java-setup
                with:
                    cache: ""
            -   name: Pre-commit checks
                uses: pre-commit/action@v3.0.1
            -   name: pre-commit-c-lite
                uses: pre-commit-ci/lite-action@v1.1.0
                if: always()
    build:
        runs-on: ${{ matrix.os }}
        needs: [ pre-commit ]
        strategy:
            fail-fast: true
            matrix:
                os: [ windows-latest, ubuntu-latest, macos-15-intel ]
            max-parallel: 1
        steps:
            -   uses: actions/checkout@v4.1.6
            -   name: Set up JDK
                uses: ./.github/actions/java-setup
                with:
                    cache: 'maven'
            -   name: Build with Maven
                run: mvn --no-transfer-progress package -DskipTests

    # ── Phase 1 + S3 Upload (push to main or manual dispatch only) ──
    phase1-s3:
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        needs: [ build ]
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
                with:
                    fetch-tags: true

            -   name: Set timestamp
                run: echo "TS=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"

            -   name: Build with Temurin JDK 25
                run: |
                    docker run --rm \
                      -v "${{ github.workspace }}:/project" \
                      -w /project \
                      -e MVN_VER="${{ env.MVN_VER }}" \
                      eclipse-temurin:25-jdk-jammy \
                      bash -c '
                        apt-get update -qq && apt-get install -y -qq curl > /dev/null &&
                        curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${MVN_VER}/binaries/apache-maven-${MVN_VER}-bin.tar.gz" -o /tmp/mvn.tar.gz &&
                        tar xzf /tmp/mvn.tar.gz -C /opt &&
                        export PATH="/opt/apache-maven-${MVN_VER}/bin:$PATH" &&
                        mvn --version &&
                        mvn package -DskipTests -q
                      '

            -   name: Login to GHCR
                uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Pull sidecar image
                run: docker pull "$SIDECAR_IMAGE"

            -   name: "Phase 1: Build result processing via sidecar"
                run: |
                    mkdir -p "${{ github.workspace }}/spdx-output"
                    docker run --rm \
                      -v "${{ github.workspace }}:/workspace/repos/WebGoat" \
                      -v "${{ github.workspace }}/spdx-output:/workspace/output" \
                      -e OMNIBOR_MODE=sidecar \
                      "$SIDECAR_IMAGE" \
                      python3 /workspace/app/analyze.py \
                        --repo WebGoat \
                        --mode sidecar \
                        --phase build \
                        --skip-clone

            -   name: Get OIDC token
                id: oidc
                run: |
                    OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                      "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ env.OIDC_AUDIENCE }}" | jq -r '.value')
                    echo "::add-mask::${OIDC_TOKEN}"
                    echo "OIDC_TOKEN=${OIDC_TOKEN}" >> "$GITHUB_ENV"

            -   name: Build ssvs_meta.json
                run: |
                    SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
                    JOB_ID="${{ env.TS }}_${SHORT_SHA}_${{ github.run_id }}"
                    echo "JOB_ID=${JOB_ID}" >> "$GITHUB_ENV"
                    # Resolve git tag if HEAD is tagged
                    GIT_TAG=$(git tag --points-at HEAD 2>/dev/null | head -n 1)
                    jq -n \
                      --argjson tenant_id '${{ env.TENANT_ID }}' \
                      --arg repository '${{ github.repository }}' \
                      --arg ref '${{ github.ref }}' \
                      --arg sha '${{ github.sha }}' \
                      --arg tag "${GIT_TAG}" \
                      --arg run_id '${{ github.run_id }}' \
                      --arg run_number '${{ github.run_number }}' \
                      --arg actor '${{ github.actor }}' \
                      --arg event_name '${{ github.event_name }}' \
                      --arg job_id "${JOB_ID}" \
                      --arg sidecar_image '${{ env.SIDECAR_IMAGE }}' \
                      --arg oidc_audience '${{ env.OIDC_AUDIENCE }}' \
                      '{
                        tenant_id: $tenant_id,
                        repository: $repository,
                        ref: $ref,
                        sha: $sha,
                        tag: (if $tag == "" then null else $tag end),
                        run_id: $run_id,
                        run_number: $run_number,
                        actor: $actor,
                        event_name: $event_name,
                        job_id: $job_id,
                        sidecar_image: $sidecar_image,
                        oidc_audience: $oidc_audience
                      }' > spdx-output/ssvs_meta.json
                    echo "[INFO] ssvs_meta.json:"
                    cat spdx-output/ssvs_meta.json

            -   name: Bundle Phase 1 artifacts
                run: |
                    tar czf /tmp/phase1.tar.gz -C spdx-output .
                    echo "[INFO] Phase 1 bundle: $(du -h /tmp/phase1.tar.gz | cut -f1)"

            -   name: Upload Phase 1 bundle via presigned URL
                run: |
                    META=$(cat spdx-output/ssvs_meta.json)
                    BODY=$(jq -n \
                      --arg repository '${{ github.repository }}' \
                      --arg job_id '${{ env.JOB_ID }}' \
                      --argjson metadata "$META" \
                      '{repository: $repository, job_id: $job_id, files: ["phase1.tar.gz"], metadata: $metadata}')
                    RESPONSE=$(curl -sS -f -X POST "${{ env.OPERATOR_URL }}/v1/upload-url" \
                      -H "Authorization: Bearer ${OIDC_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "$BODY")
                    URL=$(echo "$RESPONSE" | jq -r '.urls["phase1.tar.gz"]')
                    curl -sS -f -X PUT -T /tmp/phase1.tar.gz "$URL"
                    echo "[INFO] Phase 1 upload complete"

            -   name: Upload build output via presigned URL
                if: ${{ github.event_name == 'push' || inputs.upload_build_output }}
                run: |
                    tar czf /tmp/build.tar.gz -C target .
                    echo "[INFO] Build bundle: $(du -h /tmp/build.tar.gz | cut -f1)"
                    RESPONSE=$(curl -sS -f -X POST "${{ env.OPERATOR_URL }}/v1/upload-url" \
                      -H "Authorization: Bearer ${OIDC_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"repository\":\"${{ github.repository }}\",\"job_id\":\"${{ env.JOB_ID }}\",\"files\":[\"build.tar.gz\"]}")
                    URL=$(echo "$RESPONSE" | jq -r '.urls["build.tar.gz"]')
                    curl -sS -f -X PUT -T /tmp/build.tar.gz "$URL"
                    echo "[INFO] Build output upload complete"
